    <main>
      <section class="page-intro"><p class="eyebrow">Ebene 3</p><h1>Ableitung</h1><p>Die Ableitung beschreibt die momentane Steigung eines Graphen.</p></section>
      <section class="band"><div class="simulation-panel"><canvas id="derivativeCanvas" width="980" height="430" aria-label="Ableitung Simulation"></canvas><div class="inline-controls"><label for="derivativeSlider">x-Wert</label><input id="derivativeSlider" type="range" min="-3" max="3" value="1" step="0.01" /><strong id="slopeValue">Steigung: 2.00</strong></div></div></section>
      <section class="explain-list"><article class="explain-block"><h2>Merksatz</h2><p>Wenn f(x) = x^2 - 1 ist, dann ist f'(x) = 2x. An der Stelle x = 1 hat die Tangente deshalb die Steigung 2.</p><p class="formula">f'(x) = momentane Änderungsrate</p></article></section>
