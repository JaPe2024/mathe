<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Einheitskreis | Mathe Simulationen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">M</span>
        <span>Mathe Simulationen</span>
      </a>
      <nav class="nav" aria-label="Hauptnavigation">
        <a href="index.html">Start</a>
        <a href="fachgebiete.html">Fachgebiete</a>
        <a href="trigonometrie.html">Trigonometrie</a>
      </nav>
    </header>

    <main>
      <section class="page-intro">
        <p class="eyebrow">Ebene 3</p>
        <h1>Sinusfunktion und Einheitskreis</h1>
        <p>Der y-Wert des Punktes am Einheitskreis wird direkt als Sinusgraph dargestellt.</p>
      </section>

      <section class="band">
        <div class="sine-tool">
          <div class="sine-controls">
            <div class="btn-row">
              <button id="sinePlayBtn" class="tool-button" type="button">Abspielen</button>
              <button id="sineResetBtn" class="tool-button" type="button">Zurücksetzen</button>
              <button id="sineModeBtn" class="tool-button" type="button">Anzeige: Grad</button>
            </div>

            <label class="ctrl" for="sineAngleSlider">
              <span>Winkel</span>
              <input id="sineAngleSlider" type="range" min="0" max="628" step="1" value="0" />
              <strong id="sineAngleLabel">0 deg</strong>
            </label>

            <label class="ctrl" for="sineSpeedSlider">
              <span>Geschw.</span>
              <input id="sineSpeedSlider" type="range" min="1" max="60" step="1" value="20" />
              <strong id="sineSpeedLabel">20</strong>
            </label>
          </div>

          <canvas id="sineCanvas" width="800" height="380" aria-label="Sinusfunktion und Einheitskreis"></canvas>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">Winkel</div>
              <div class="stat-value" id="sineStatAngle">0 deg</div>
            </div>
            <div class="stat">
              <div class="stat-label">sin(theta)</div>
              <div class="stat-value" id="sineStatSin">0.000</div>
            </div>
            <div class="stat">
              <div class="stat-label">cos(theta)</div>
              <div class="stat-value" id="sineStatCos">1.000</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
